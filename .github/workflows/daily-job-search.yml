name: Daily DevOps Job Search

on:
  push:
    branches:
      - main
  schedule:
    # 9:00 AM IST = 3:30 UTC (IST is UTC+5:30)
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      job_age_days:
        description: 'Only include jobs posted within this many days'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '3'
          - '7'
          - '15'
          - '30'

env:
  PYTHON_VERSION: '3.11'

jobs:
  search-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run job scraper
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          JOB_FRESHNESS_DAYS: ${{ inputs.job_age_days || '1' }}
        run: |
          python scraper/main.py 2>&1 | tee job_search.log

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: devops-jobs-report
          path: output/*.csv
          retention-days: 30

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: devops-jobs-html
          path: output/*.html
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-search-logs
          path: job_search.log
          retention-days: 7
